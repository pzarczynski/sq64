[project]
name = "sq64-chess"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
sq64-perft= "sq64_chess.perft:main"

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sq64_chess"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
filterwarnings = ["error"]