[project]
name = "sq64-ui"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.7",
    "sq64-chess",
    "sq64-engine",
]

[project.scripts]
sq64-gui = "sq64_ui.__main__:main"

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sq64_ui"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
filterwarnings = ["error"]

[tool.uv.sources]
sq64-chess = { workspace = true }
sq64-engine = { workspace = true }
