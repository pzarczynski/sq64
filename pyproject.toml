[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "basedpyright>=1.39.7",
    "ruff>=0.15.17",
]

[tool.ruff]
line-length = 90
target-version = "py311"
src = ["packages"]

[tool.ruff.lint]
select = [
    "W", "I", "C90", "N", "S", "UP", "A", "B", "FBT", "Q",
    "RUF", "SIM", "PTH", "C4", "COM", "TID", "ARG", "ANN", "PERF", "SLOT"
]
ignore = ["F401", "E701"]

[tool.ruff.lint.per-file-ignores]
"**/tests/*.py" = ["S101"]

[tool.basedpyright]
include = ["packages"]
pythonVersion = "3.11"
reportMissingTypeStubs = false
reportAny = false
reportImplicitRelativeImport = true
reportUnusedCallResult = false
reportImplicitOverride = false